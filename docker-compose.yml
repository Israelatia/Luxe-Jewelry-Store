version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.app
    container_name: backend
    ports:
      - "5000:8000"

  front:
    build:
      context: .                  # repo root
      dockerfile: Dockerfile.nginx
    container_name: front
    ports:
      - "80:80"

