version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: infra/Dockerfile.app
    container_name: luxe-jewelry-store-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DEBUG=true
    networks:
      - luxe-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: luxe-jewelry-store-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - luxe-network
    restart: unless-stopped

networks:
  luxe-network:
    driver: bridge
