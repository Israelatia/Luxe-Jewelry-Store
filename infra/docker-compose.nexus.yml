version: '3.8'

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus-repository
    restart: unless-stopped
    ports:
      - "8081:8081"     # Nexus UI
      - "8082:8082"     # Docker registry (hosted)
      - "8083:8083"     # Docker registry (group)
    volumes:
      - nexus-data:/nexus-data
    environment:
      - NEXUS_SECURITY_RANDOMPASSWORD=false
      - INSTALL4J_ADD_VM_PARAMS=-Xms2g -Xmx2g -XX:MaxDirectMemorySize=3g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - nexus-network

  # Optional: Nginx proxy for SSL termination and custom domain
  nexus-proxy:
    image: nginx:alpine
    container_name: nexus-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nexus
    networks:
      - nexus-network
    profiles:
      - proxy

volumes:
  nexus-data:
    driver: local

networks:
  nexus-network:
    driver: bridge
